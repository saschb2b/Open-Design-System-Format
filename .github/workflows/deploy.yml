name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "examples/**"
      - "tools/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Build site (Astro)
        working-directory: site
        run: pnpm build

      - name: Assemble — copy the viewer and example bundles beside the page
        run: |
          cp -r tools site/dist/tools
          cp -r examples site/dist/examples

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
