<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Radio</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; } fieldset { border: 0; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; } legend { font-weight: 500; margin-bottom: 4px; padding: 0; } </style>
</head>
<body>
  <fieldset>
    <legend>Build cache</legend>
    <label class="radio"><input type="radio" name="cache" checked> Use existing build cache</label>
    <label class="radio"><input type="radio" name="cache"> Ignore build cache</label>
    <label class="radio"><input type="radio" name="cache"> Clear cache and rebuild</label>
  </fieldset>
</body>
</html>
