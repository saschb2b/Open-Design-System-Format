<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Card</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; } .card { max-width: 380px; } </style>
</head>
<body>
  <div class="card">
    <div class="card-body">
      <h3 class="h3" style="font-size:16px; margin-bottom:6px">Usage</h3>
      <p class="muted" style="margin:0">You've used 68% of your included bandwidth this month.</p>
      <div style="height:14px"></div>
      <div class="progress"><div class="progress-bar progress-bar--blue" style="width:68%"></div></div>
    </div>
    <div class="card-footer">Resets on July 1</div>
  </div>
</body>
</html>
