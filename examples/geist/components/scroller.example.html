<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Scroller</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; } .scroller { max-width: 360px; } .item { padding: 10px 16px; border-radius: 6px; box-shadow: var(--ds-shadow-border); white-space: nowrap; } </style>
</head>
<body>
  <div class="scroller" tabindex="0" aria-label="Regions">
    <span class="item">Washington, D.C.</span>
    <span class="item">San Francisco</span>
    <span class="item">Frankfurt</span>
    <span class="item">Singapore</span>
    <span class="item">São Paulo</span>
    <span class="item">Sydney</span>
  </div>
</body>
</html>
