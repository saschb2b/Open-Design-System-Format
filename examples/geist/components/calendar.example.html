<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Calendar</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; } </style>
</head>
<body>
  <div class="calendar" role="application" aria-label="June 2026">
    <div class="calendar-head">
      <button class="btn btn-ghost btn-icon btn-sm" type="button" aria-label="Previous month">‹</button>
      <strong>June 2026</strong>
      <button class="btn btn-ghost btn-icon btn-sm" type="button" aria-label="Next month">›</button>
    </div>
    <div class="calendar-grid">
      <span class="dow">M</span><span class="dow">T</span><span class="dow">W</span><span class="dow">T</span><span class="dow">F</span><span class="dow">S</span><span class="dow">S</span>
      <button class="dim">26</button><button class="dim">27</button><button class="dim">28</button><button class="dim">29</button><button class="dim">30</button><button class="dim">31</button><button>1</button>
      <button>2</button><button>3</button><button>4</button><button>5</button><button>6</button><button>7</button><button>8</button>
      <button>9</button><button>10</button><button>11</button><button>12</button><button>13</button><button>14</button><button>15</button>
      <button>16</button><button>17</button><button>18</button><button>19</button><button>20</button><button>21</button><button aria-selected="true">22</button>
      <button>23</button><button>24</button><button>25</button><button>26</button><button>27</button><button>28</button><button>29</button>
    </div>
  </div>
</body>
</html>
