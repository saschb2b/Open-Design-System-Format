<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Command menu</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; } .command { width: 440px; max-width: 100%; background: var(--ds-background-100); border-radius: var(--ds-radius-large); box-shadow: var(--ds-shadow-menu); overflow: hidden; } .menu { box-shadow: none; padding: 6px; } </style>
</head>
<body>
  <div class="command" role="dialog" aria-label="Command menu">
    <input role="combobox" aria-expanded="true" aria-label="Command" placeholder="Type a command or search…" value="deploy">
    <div class="menu" role="listbox">
      <div class="menu-label">Commands</div>
      <div class="menu-item" role="option" aria-selected="true">Create deployment <span class="kbd">D</span></div>
      <div class="menu-item" role="option">Redeploy latest</div>
      <div class="menu-label">Navigation</div>
      <div class="menu-item" role="option">Go to Deployments</div>
    </div>
  </div>
</body>
</html>
