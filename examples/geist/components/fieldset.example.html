<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Fieldset</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; } .fieldset { max-width: 520px; } .input { max-width: 320px; } </style>
</head>
<body>
  <form class="fieldset">
    <div class="fieldset-body">
      <h3 class="h3" style="font-size:16px">Project Name</h3>
      <p class="muted text-sm" style="margin:0 0 4px">Used to identify your project on the dashboard.</p>
      <input class="input" type="text" value="design-system" aria-label="Project name">
    </div>
    <div class="fieldset-footer">
      <span>Learn more about Project Name</span>
      <button class="btn btn-primary btn-sm" type="submit">Save</button>
    </div>
  </form>
</body>
</html>
