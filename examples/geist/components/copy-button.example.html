<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Copy button</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; display: flex; gap: 10px; align-items: center; } </style>
</head>
<body>
  <button class="btn btn-ghost btn-icon btn-sm" type="button" aria-label="Copy">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M3.5 10.5h-1a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v1"/></svg>
  </button>
  <!-- success state -->
  <button class="btn btn-ghost btn-icon btn-sm" type="button" aria-label="Copied">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true" style="color:var(--ds-green-700)"><path d="M3 8.5l3 3 7-7"/></svg>
  </button>
</body>
</html>
