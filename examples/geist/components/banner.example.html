<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geist · Banner</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 0; display: flex; flex-direction: column; gap: 12px; } </style>
</head>
<body>
  <div class="banner" role="status">
    <span style="flex:1">Scheduled maintenance on June 30, 02:00–03:00 UTC.</span>
    <button class="btn btn-ghost btn-sm" type="button">Learn more</button>
  </div>
  <div class="banner banner--blue" role="status">
    <span style="flex:1">Geist 2.0 is now available.</span>
    <button class="btn btn-sm" type="button" style="background:var(--ds-background-100); color:var(--ds-gray-1000)">Read changelog</button>
  </div>
</body>
</html>
