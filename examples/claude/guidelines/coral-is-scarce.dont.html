<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude · Don't — coral everywhere</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style>
    body { padding: 48px; }
    /* DON'T: paint everything coral. With no scarcity, nothing leads. */
    .display-lg { color: var(--colors-primary); }
    .feature-card { border: 2px solid var(--colors-primary); }
    .feature-card__icon { color: var(--colors-primary); }
    .title-md { color: var(--colors-primary); }
  </style>
</head>
<body>
  <h2 class="display-lg">Built to do real work</h2>
  <p class="body-md" style="margin:12px 0 28px;">Every accent is coral, so the eye has nowhere to land — compare the restrained real grid.</p>
  <div class="grid grid-3">
    <div class="feature-card"><svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v18M3 12h18"/></svg><h3 class="title-md">Extended thinking</h3><p class="body-md">Reasons step by step.</p><button class="btn btn--primary" style="margin-top:12px">Learn more</button></div>
    <div class="feature-card"><svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg><h3 class="title-md">Long context</h3><p class="body-md">Reads whole codebases.</p><button class="btn btn--primary" style="margin-top:12px">Learn more</button></div>
    <div class="feature-card"><svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 7l5 5-5 5M13 17h6"/></svg><h3 class="title-md">Agentic tools</h3><p class="body-md">Finishes multi-step tasks.</p><button class="btn btn--primary" style="margin-top:12px">Learn more</button></div>
  </div>
</body>
</html>
