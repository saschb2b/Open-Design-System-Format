<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude · Don't — bold sans headline</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 64px; } .wrong { max-width: 16ch; } </style>
</head>
<body>
  <!-- DON'T: headline in a bold sans instead of the regular-weight serif display.
       Same words as the hero, but the literary, considered voice is gone. -->
  <h1 class="wrong" style="font-family: var(--typography-fontFamily-sans); font-weight: 800; font-size: 64px; line-height: 1.05; letter-spacing: -1px; color: var(--colors-ink); margin: 0;">
    Meet your thinking partner
  </h1>
  <p class="body-md" style="margin-top:20px;">Compare with the serif-display hero in the landing page — this bold sans reads like a generic AI product.</p>
</body>
</html>
