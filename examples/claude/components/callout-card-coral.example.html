<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude · Coral callout</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 48px; } .callout-coral { max-width: 880px; } </style>
</head>
<body>
  <div class="callout-coral">
    <!-- The headline stays serif even on coral. -->
    <h2 class="display-sm">Start building with Claude today</h2>
    <p class="body-md" style="color: var(--colors-on-primary); opacity: .92; max-width: 46ch;">
      Get your API key and make your first request in minutes.
    </p>
    <!-- The button inverts to a cream fill on coral. -->
    <button type="button" class="btn btn--on-coral">Get API key</button>
  </div>
</body>
</html>
