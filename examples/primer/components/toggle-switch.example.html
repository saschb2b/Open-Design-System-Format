<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primer · Toggle switch</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; display: flex; flex-direction: column; gap: 16px; } .row { display: flex; align-items: center; gap: 12px; } </style>
</head>
<body>
  <div class="row">
    <button class="ToggleSwitch" role="switch" aria-checked="true" aria-label="Email notifications"></button>
    <span>Email notifications</span>
  </div>
  <div class="row">
    <button class="ToggleSwitch" role="switch" aria-checked="false" aria-label="Web notifications"></button>
    <span>Web notifications</span>
  </div>
</body>
</html>
