<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primer · Text input</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; display: flex; gap: 24px; flex-wrap: wrap; } .form-group { width: 260px; } </style>
</head>
<body>
  <div class="form-group">
    <label class="FormControl-label" for="repo">Repository name</label>
    <input class="form-control" id="repo" type="text" placeholder="my-project">
  </div>
  <!-- autofocus shows the accent focus border + ring -->
  <div class="form-group">
    <label class="FormControl-label" for="desc">Description</label>
    <input class="form-control" id="desc" type="text" value="A short description" autofocus>
  </div>
</body>
</html>
