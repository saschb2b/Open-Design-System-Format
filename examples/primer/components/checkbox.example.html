<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primer · Checkbox</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; display: flex; flex-direction: column; gap: 12px; } </style>
</head>
<body>
  <div class="FormControl-check">
    <input type="checkbox" id="watch" checked>
    <label for="watch">Watch this repository</label>
  </div>
  <div class="FormControl-check">
    <input type="checkbox" id="releases">
    <label for="releases">Releases only<span class="caption">Be notified of new releases.</span></label>
  </div>
  <div class="FormControl-check">
    <input type="checkbox" id="ignore">
    <label for="ignore">Ignore</label>
  </div>
</body>
</html>
