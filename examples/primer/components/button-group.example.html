<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primer · Button group</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; } </style>
</head>
<body>
  <div class="BtnGroup" role="group" aria-label="Text alignment">
    <button class="btn" type="button">Left</button>
    <button class="btn" type="button">Center</button>
    <button class="btn" type="button">Right</button>
  </div>

  <!-- Split button: primary action + menu trigger -->
  <div class="BtnGroup" role="group" aria-label="Commit">
    <button class="btn btn-primary" type="button">Commit changes</button>
    <button class="btn btn-primary btn-icon" type="button" aria-label="More commit options">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"/></svg>
    </button>
  </div>
</body>
</html>
