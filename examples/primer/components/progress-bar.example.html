<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primer · Progress bar</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style> body { padding: 24px; display: flex; flex-direction: column; gap: 20px; max-width: 420px; } </style>
</head>
<body>
  <div class="ProgressBar" role="progressbar" aria-label="Setup" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100">

  </div>
</body>
</html>
